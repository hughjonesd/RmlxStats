name: mlxs fuzz

on:
  schedule:
    - cron: "17 3 * * *"
    - cron: "43 4 * * 0"
  workflow_dispatch:
    inputs:
      tier:
        description: "Fuzz tier to run"
        required: true
        default: "fast"
        type: choice
        options:
          - fast
          - full

permissions:
  contents: write

jobs:
  fuzz:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select fuzz tier
        id: tier
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tier="${{ inputs.tier }}"
          elif [[ "${{ github.event.schedule }}" == "43 4 * * 0" ]]; then
            tier="full"
          else
            tier="fast"
          fi
          echo "tier=${tier}" >> "${GITHUB_OUTPUT}"
          out_dir="fuzz-results/github-macos-26"
          echo "out_dir=${out_dir}" >> "${GITHUB_OUTPUT}"

      - name: Check whether fuzz results need updating
        id: changes
        shell: bash
        run: |
          tier="${{ steps.tier.outputs.tier }}"
          out_dir="${{ steps.tier.outputs.out_dir }}"
          csvs=(
            "${out_dir}/mlxs-lm-deterministic-${tier}.csv"
            "${out_dir}/mlxs-lm-monte-carlo-${tier}.csv"
            "${out_dir}/mlxs-glm-deterministic-${tier}.csv"
            "${out_dir}/mlxs-glm-monte-carlo-${tier}.csv"
            "${out_dir}/mlxs-glmnet-deterministic-${tier}.csv"
            "${out_dir}/mlxs-glmnet-monte-carlo-${tier}.csv"
            "${out_dir}/mlxs-prcomp-deterministic-${tier}.csv"
            "${out_dir}/mlxs-prcomp-monte-carlo-${tier}.csv"
          )
          last_commit="$(git log -1 --format=%H -- "${csvs[@]}" || true)"
          head_commit="$(git rev-parse HEAD)"
          if [[ -n "${last_commit}" ]] &&
             [[ "${last_commit}" == "${head_commit}" ]]; then
            echo "run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "run=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install MLX C++ library
        if: steps.changes.outputs.run == 'true'
        run: |
          brew update
          brew install mlx

      - uses: r-lib/actions/setup-r@v2
        if: steps.changes.outputs.run == 'true'
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: steps.changes.outputs.run == 'true'
        with:
          extra-packages: local::., any::devtools
          needs: test

      - name: Run mlxs fuzz tests
        if: steps.changes.outputs.run == 'true'
        env:
          RMLXSTATS_RUN_FUZZ: ${{ steps.tier.outputs.tier }}
          RMLXSTATS_FUZZ_OUT: ${{ steps.tier.outputs.out_dir }}
        run: |
          R -q -e 'devtools::test(filter = "fuzz")'

      - name: Commit updated fuzz results
        if: steps.changes.outputs.run == 'true'
        shell: bash
        run: |
          tier="${{ steps.tier.outputs.tier }}"
          out_dir="tests/testthat/${{ steps.tier.outputs.out_dir }}"
          csvs=(
            "${out_dir}/mlxs-lm-deterministic-${tier}.csv"
            "${out_dir}/mlxs-lm-monte-carlo-${tier}.csv"
            "${out_dir}/mlxs-glm-deterministic-${tier}.csv"
            "${out_dir}/mlxs-glm-monte-carlo-${tier}.csv"
            "${out_dir}/mlxs-glmnet-deterministic-${tier}.csv"
            "${out_dir}/mlxs-glmnet-monte-carlo-${tier}.csv"
            "${out_dir}/mlxs-prcomp-deterministic-${tier}.csv"
            "${out_dir}/mlxs-prcomp-monte-carlo-${tier}.csv"
          )
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${csvs[@]}"
          if git diff --cached --quiet; then
            echo "No fuzz result changes to commit."
          else
            git commit -m "Update ${{ steps.tier.outputs.tier }} fuzz results"
            git push
          fi
